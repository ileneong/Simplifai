<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simplifai — 5 prompts that replace a $2,000/month marketing hire</title>
  <link rel="stylesheet" href="../../brand-guidelines/simplifai/colors_and_type.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e; /* dark preview surround */
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* 1080×1350 — 4:5 ratio, always — Scheme A: Yellow Hero */
    .slide {
      width: 1080px; height: 1350px;
      position: relative; overflow: hidden;
      background: #ffc857; /* --color-yellow */
      flex-shrink: 0;
    }

    .content {
      position: absolute; inset: 0;
      padding: 96px; /* --space-9 safe zone */
      display: flex; flex-direction: column; justify-content: center;
    }

    /* Accent — oversized asterisk, top-left, coral */
    .accent {
      position: absolute;
      top: 96px; left: 96px;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 150px;
      line-height: 0.7;
      color: #ff7a59; /* --color-coral */
    }

    .headline {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 96px;
      line-height: 1.03;
      letter-spacing: -0.025em;
      color: #1a1a2e; /* --color-text-primary */
      margin-bottom: 44px;
    }

    .rule {
      width: 96px; height: 8px;
      background: #ff7a59; /* coral */
      border-radius: 4px;
      margin-bottom: 44px;
    }

    .body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 500;
      font-size: 42px;
      line-height: 1.6;
      color: #2a5f74; /* deep teal — Scheme A body */
      max-width: 880px;
    }

    .logo {
      position: absolute;
      bottom: 96px; left: 96px;
      width: 280px; height: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="slide" id="slide-1">
    <div class="accent">*</div>
    <div class="content">
      <div class="headline">5 prompts that replace a $2,000/month marketing hire.</div>
      <div class="rule"></div>
      <div class="body">You don't need an agency on retainer. You need five good prompts and ten minutes. The full set is in the caption, so save it.</div>
    </div>
    <img class="logo" src="../../brand-guidelines/simplifai/assets/logo-2026/simplifai-lockup-horizontal.svg" alt="Simplifai">
  </div>
</body>
</html>
