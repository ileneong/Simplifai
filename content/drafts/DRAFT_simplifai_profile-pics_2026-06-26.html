<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Simplifai — Profile Picture Tiles (1080×1080)</title>
<link rel="stylesheet" href="../../brand-guidelines/simplifai/colors_and_type.css">
<style>
  :root{
    --coral:#ff7a59; --purple:#8a4fff; --yellow:#ffc857; --navy:#1a1a2e; --bg:#f5f3ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#2a2a3a;font-family:'Plus Jakarta Sans',sans-serif;}

  /* viewer-only chrome — hidden during export */
  .stage{display:flex;flex-wrap:wrap;gap:24px;padding:24px;}
  .label{color:#fff;text-align:center;font-size:13px;margin-top:8px;opacity:.7;}

  .tile{
    width:1080px;height:1080px;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  /* circle-crop guide (viewer only) */
  .tile::after{
    content:"";position:absolute;inset:0;border-radius:50%;
    box-shadow:0 0 0 9999px rgba(0,0,0,0); pointer-events:none;
  }
  .icon{width:520px;height:520px;display:block;}

  /* background variants */
  .bg-coral  {background:var(--coral);}
  .bg-purple {background:var(--purple);}
  .bg-navy   {background:var(--navy);}
  .bg-white  {background:#ffffff;}
  .bg-yellow {background:var(--yellow);}
  .bg-light  {background:var(--bg);}
</style>
</head>
<body>
<div class="stage">

  <!-- 1. Coral solid + white icon (primary FB pic) -->
  <div>
    <div id="slide-1" class="slide tile bg-coral">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Simplifai">
        <defs>
          <mask id="cA1"><rect width="100" height="100" fill="#fff"/><rect x="24" y="24" width="52" height="52" rx="19"/></mask>
          <mask id="cP1"><rect width="100" height="100" fill="#fff"/><rect x="41" y="41" width="52" height="52" rx="19"/></mask>
        </defs>
        <rect x="12" y="12" width="42" height="42" rx="14" fill="#fff" mask="url(#cA1)"/>
        <rect x="29" y="29" width="42" height="42" rx="14" fill="#fff" mask="url(#cP1)"/>
        <rect x="46" y="46" width="42" height="42" rx="14" fill="#fff"/>
      </svg>
    </div>
    <div class="label">01 — coral bg + white icon (primary)</div>
  </div>

  <!-- 2. Purple solid + white icon -->
  <div>
    <div id="slide-2" class="slide tile bg-purple">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Simplifai">
        <defs>
          <mask id="cA2"><rect width="100" height="100" fill="#fff"/><rect x="24" y="24" width="52" height="52" rx="19"/></mask>
          <mask id="cP2"><rect width="100" height="100" fill="#fff"/><rect x="41" y="41" width="52" height="52" rx="19"/></mask>
        </defs>
        <rect x="12" y="12" width="42" height="42" rx="14" fill="#fff" mask="url(#cA2)"/>
        <rect x="29" y="29" width="42" height="42" rx="14" fill="#fff" mask="url(#cP2)"/>
        <rect x="46" y="46" width="42" height="42" rx="14" fill="#fff"/>
      </svg>
    </div>
    <div class="label">02 — purple bg + white icon</div>
  </div>

  <!-- 3. Navy solid + white icon -->
  <div>
    <div id="slide-3" class="slide tile bg-navy">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Simplifai">
        <defs>
          <mask id="cA3"><rect width="100" height="100" fill="#fff"/><rect x="24" y="24" width="52" height="52" rx="19"/></mask>
          <mask id="cP3"><rect width="100" height="100" fill="#fff"/><rect x="41" y="41" width="52" height="52" rx="19"/></mask>
        </defs>
        <rect x="12" y="12" width="42" height="42" rx="14" fill="#fff" mask="url(#cA3)"/>
        <rect x="29" y="29" width="42" height="42" rx="14" fill="#fff" mask="url(#cP3)"/>
        <rect x="46" y="46" width="42" height="42" rx="14" fill="#fff"/>
      </svg>
    </div>
    <div class="label">03 — navy bg + white icon</div>
  </div>

  <!-- 4. White solid + full-colour icon -->
  <div>
    <div id="slide-4" class="slide tile bg-white">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Simplifai">
        <defs>
          <mask id="cA4"><rect width="100" height="100" fill="#fff"/><rect x="24" y="24" width="52" height="52" rx="19"/></mask>
          <mask id="cP4"><rect width="100" height="100" fill="#fff"/><rect x="41" y="41" width="52" height="52" rx="19"/></mask>
        </defs>
        <rect x="12" y="12" width="42" height="42" rx="14" fill="#ffc857" mask="url(#cA4)"/>
        <rect x="29" y="29" width="42" height="42" rx="14" fill="#ff7a59" mask="url(#cP4)"/>
        <rect x="46" y="46" width="42" height="42" rx="14" fill="#8a4fff"/>
      </svg>
    </div>
    <div class="label">04 — white bg + full-colour icon</div>
  </div>

  <!-- 5. Light tint solid + full-colour icon -->
  <div>
    <div id="slide-5" class="slide tile bg-light">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Simplifai">
        <defs>
          <mask id="cA5"><rect width="100" height="100" fill="#fff"/><rect x="24" y="24" width="52" height="52" rx="19"/></mask>
          <mask id="cP5"><rect width="100" height="100" fill="#fff"/><rect x="41" y="41" width="52" height="52" rx="19"/></mask>
        </defs>
        <rect x="12" y="12" width="42" height="42" rx="14" fill="#ffc857" mask="url(#cA5)"/>
        <rect x="29" y="29" width="42" height="42" rx="14" fill="#ff7a59" mask="url(#cP5)"/>
        <rect x="46" y="46" width="42" height="42" rx="14" fill="#8a4fff"/>
      </svg>
    </div>
    <div class="label">05 — light tint bg + full-colour icon</div>
  </div>

  <!-- 6. Yellow solid + navy icon -->
  <div>
    <div id="slide-6" class="slide tile bg-yellow">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Simplifai">
        <defs>
          <mask id="cA6"><rect width="100" height="100" fill="#fff"/><rect x="24" y="24" width="52" height="52" rx="19"/></mask>
          <mask id="cP6"><rect width="100" height="100" fill="#fff"/><rect x="41" y="41" width="52" height="52" rx="19"/></mask>
        </defs>
        <rect x="12" y="12" width="42" height="42" rx="14" fill="#1a1a2e" mask="url(#cA6)"/>
        <rect x="29" y="29" width="42" height="42" rx="14" fill="#1a1a2e" mask="url(#cP6)"/>
        <rect x="46" y="46" width="42" height="42" rx="14" fill="#1a1a2e"/>
      </svg>
    </div>
    <div class="label">06 — yellow bg + navy mono icon</div>
  </div>

</div>
</body>
</html>
