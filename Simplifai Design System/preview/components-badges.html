<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f3ff; padding: 20px 24px; }
  .section { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .row-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #9999b8; min-width: 72px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 9999px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Status badges */
  .badge-green  { background: rgba(78,203,113,0.14); color: #1a7a3a; }
  .badge-red    { background: rgba(255,92,92,0.12);  color: #c0392b; }
  .badge-yellow { background: rgba(255,200,87,0.2);  color: #8a5c00; }
  .badge-blue   { background: rgba(74,144,226,0.14); color: #1a5ba0; }
  .badge-purple { background: rgba(138,79,255,0.12); color: #6a2fe0; }
  .badge-grey   { background: rgba(90,90,122,0.1);   color: #5a5a7a; }

  /* Solid badges */
  .badge-solid-coral   { background: #ff7a59; color: #fff; }
  .badge-solid-purple  { background: #8a4fff; color: #fff; }
  .badge-solid-yellow  { background: #ffc857; color: #1a1a2e; }

  /* Chips (larger, interactive-looking) */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 9999px;
    font-size: 13px; font-weight: 600;
    border: 1.5px solid rgba(138,79,255,0.2);
    background: #fff; color: #1a1a2e; cursor: pointer;
    transition: all 200ms;
  }
  .chip.active { background: #8a4fff; color: #fff; border-color: #8a4fff; }
  .chip-x { font-size: 14px; opacity: 0.6; margin-left: 2px; }
</style>
</head>
<body>
<div class="section">
  <div class="row">
    <div class="row-label">Status</div>
    <span class="badge badge-green"><span class="badge-dot" style="background:#4ecb71;"></span>Active</span>
    <span class="badge badge-red"><span class="badge-dot" style="background:#ff5c5c;"></span>Failed</span>
    <span class="badge badge-yellow"><span class="badge-dot" style="background:#ffc857;"></span>Pending</span>
    <span class="badge badge-blue"><span class="badge-dot" style="background:#4a90e2;"></span>Scheduled</span>
    <span class="badge badge-grey"><span class="badge-dot" style="background:#9999b8;"></span>Draft</span>
  </div>
  <div class="row">
    <div class="row-label">Labels</div>
    <span class="badge badge-purple">AI generated</span>
    <span class="badge badge-blue">Social</span>
    <span class="badge badge-yellow">Email</span>
    <span class="badge badge-grey">Template</span>
    <span class="badge badge-green">Published</span>
  </div>
  <div class="row">
    <div class="row-label">Solid</div>
    <span class="badge badge-solid-coral">New</span>
    <span class="badge badge-solid-purple">Pro</span>
    <span class="badge badge-solid-yellow">Beta</span>
  </div>
  <div class="row">
    <div class="row-label">Chips</div>
    <span class="chip active">All</span>
    <span class="chip">Posts</span>
    <span class="chip">Emails</span>
    <span class="chip">Ads</span>
    <span class="chip">Instagram <span class="chip-x">×</span></span>
  </div>
</div>
</body>
</html>
