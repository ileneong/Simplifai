<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f3ff; padding: 20px 24px; }
  .row { display: flex; flex-direction: column; gap: 10px; }
  .specimen { display: flex; align-items: baseline; gap: 16px; padding-bottom: 10px; border-bottom: 1px solid rgba(138,79,255,0.08); }
  .specimen:last-child { border-bottom: none; }
  .meta { min-width: 140px; flex-shrink: 0; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #9999b8; }
  .spec { font-size: 10px; color: #b98cff; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="specimen">
    <div class="meta"><div class="label">Display</div><div class="spec">Poppins 800 / 52px</div></div>
    <div style="font-family:'Poppins',sans-serif; font-size:48px; font-weight:800; color:#1a1a2e; line-height:1.1; letter-spacing:-0.02em;">Your AI marketing team</div>
  </div>
  <div class="specimen">
    <div class="meta"><div class="label">H1</div><div class="spec">Poppins 700 / 36px</div></div>
    <div style="font-family:'Poppins',sans-serif; font-size:36px; font-weight:700; color:#1a1a2e; line-height:1.15; letter-spacing:-0.02em;">Simple, sustainable marketing</div>
  </div>
  <div class="specimen">
    <div class="meta"><div class="label">H2</div><div class="spec">Poppins 600 / 26px</div></div>
    <div style="font-family:'Poppins',sans-serif; font-size:26px; font-weight:600; color:#1a1a2e; line-height:1.25;">Grow your business with AI</div>
  </div>
  <div class="specimen">
    <div class="meta"><div class="label">H3</div><div class="spec">Poppins 600 / 20px</div></div>
    <div style="font-family:'Poppins',sans-serif; font-size:20px; font-weight:600; color:#1a1a2e; line-height:1.3;">Your campaigns, simplified</div>
  </div>
  <div class="specimen">
    <div class="meta"><div class="label">H4</div><div class="spec">Plus Jakarta Sans 700 / 16px</div></div>
    <div style="font-family:'Plus Jakarta Sans',sans-serif; font-size:16px; font-weight:700; color:#1a1a2e; line-height:1.4;">Write your first post today</div>
  </div>
</div>
</body>
</html>
