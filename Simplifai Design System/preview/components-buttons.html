<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f3ff; padding: 20px 24px; }
  .section { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #9999b8; min-width: 80px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 22px; border-radius: 9999px;
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600;
    border: none; cursor: pointer; transition: all 250ms cubic-bezier(0.22,1,0.36,1);
    text-decoration: none; white-space: nowrap;
  }
  .btn:hover { transform: scale(1.03); }
  .btn:active { transform: scale(0.97); }

  .btn-primary { background: #ff7a59; color: #fff; box-shadow: 0 4px 16px rgba(255,122,89,0.3); }
  .btn-primary:hover { background: #e55e3d; }

  .btn-purple { background: #8a4fff; color: #fff; box-shadow: 0 4px 16px rgba(138,79,255,0.3); }
  .btn-purple:hover { background: #6a2fe0; }

  .btn-ghost { background: transparent; color: #8a4fff; border: 2px solid #8a4fff; }
  .btn-ghost:hover { background: rgba(138,79,255,0.06); }

  .btn-soft { background: rgba(138,79,255,0.1); color: #8a4fff; }
  .btn-soft:hover { background: rgba(138,79,255,0.18); }

  .btn-yellow { background: #ffc857; color: #1a1a2e; box-shadow: 0 4px 16px rgba(255,200,87,0.35); }
  .btn-yellow:hover { background: #e0a830; }

  .btn-sm { padding: 6px 16px; font-size: 12px; }
  .btn-lg { padding: 14px 32px; font-size: 16px; }

  .btn-disabled { background: #e0dde8; color: #9999b8; cursor: not-allowed; box-shadow: none; }
  .btn-disabled:hover { transform: none; }
</style>
</head>
<body>
<div class="section">
  <div class="row">
    <div class="label">Primary</div>
    <button class="btn btn-primary">Get started</button>
    <button class="btn btn-purple">Create campaign</button>
    <button class="btn btn-yellow">See it live</button>
  </div>
  <div class="row">
    <div class="label">Secondary</div>
    <button class="btn btn-ghost">Learn more</button>
    <button class="btn btn-soft">View details</button>
    <button class="btn btn-disabled" disabled>Unavailable</button>
  </div>
  <div class="row">
    <div class="label">Sizes</div>
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary btn-lg">Large</button>
  </div>
</div>
</body>
</html>
