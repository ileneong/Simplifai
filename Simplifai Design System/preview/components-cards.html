<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f3ff; padding: 20px 24px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 24px rgba(138,79,255,0.10);
    flex: 1; min-width: 160px; max-width: 220px;
  }
  .card-accent {
    background: #8a4fff;
    border-radius: 20px;
    padding: 20px;
    flex: 1; min-width: 160px; max-width: 220px;
  }
  .card-coral {
    background: #ff7a59;
    border-radius: 20px;
    padding: 20px;
    flex: 1; min-width: 160px; max-width: 220px;
  }

  .icon-wrap {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px; font-size: 18px;
  }
  .card-title { font-family: 'Poppins'; font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .card-body { font-family: 'Plus Jakarta Sans'; font-size: 12px; color: #5a5a7a; line-height: 1.5; }

  .card-accent .card-title { color: #fff; }
  .card-accent .card-body { color: rgba(255,255,255,0.75); }
  .card-coral .card-title { color: #fff; }
  .card-coral .card-body { color: rgba(255,255,255,0.85); }

  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 9999px; margin-top: 8px; }
  .badge-green { background: rgba(78,203,113,0.15); color: #2a8a4a; }
  .badge-purple { background: rgba(138,79,255,0.12); color: #8a4fff; }
</style>
</head>
<body>
<div class="row">
  <div class="card">
    <div class="icon-wrap" style="background:#f5f3ff;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8a4fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </div>
    <div class="card-title">Write content</div>
    <div class="card-body">AI-powered posts ready in seconds.</div>
    <div class="badge badge-purple">New</div>
  </div>
  <div class="card-accent">
    <div class="icon-wrap" style="background:rgba(255,255,255,0.15);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="card-title">Schedule posts</div>
    <div class="card-body">Your calendar, automated.</div>
    <div class="badge" style="background:rgba(255,255,255,0.2); color:#fff;">3 scheduled</div>
  </div>
  <div class="card-coral">
    <div class="icon-wrap" style="background:rgba(255,255,255,0.2);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div class="card-title">Track results</div>
    <div class="card-body">See what's working at a glance.</div>
    <div class="badge" style="background:rgba(255,255,255,0.2); color:#fff; margin-top:8px;">↑ 24% reach</div>
  </div>
  <div class="card">
    <div class="icon-wrap" style="background:#fff8e6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e0a830" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <div class="card-title">Campaign results</div>
    <div class="card-body">Your top campaign this month.</div>
    <div class="badge badge-green">↑ 18% growth</div>
  </div>
</div>
</body>
</html>
