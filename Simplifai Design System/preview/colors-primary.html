<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f3ff; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { border-radius: 12px; overflow: hidden; flex: 1; min-width: 100px; }
  .chip { height: 72px; }
  .meta { padding: 8px 10px; background: #fff; }
  .name { font-size: 12px; font-weight: 700; color: #1a1a2e; }
  .hex { font-size: 11px; color: #9999b8; font-family: monospace; }
  .var { font-size: 10px; color: #b98cff; font-family: monospace; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="chip" style="background:#ff7a59;"></div>
    <div class="meta"><div class="name">Coral</div><div class="hex">#ff7a59</div><div class="var">--color-coral</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#ffb09e;"></div>
    <div class="meta"><div class="name">Coral Light</div><div class="hex">#ffb09e</div><div class="var">--color-coral-light</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#e55e3d;"></div>
    <div class="meta"><div class="name">Coral Dark</div><div class="hex">#e55e3d</div><div class="var">--color-coral-dark</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#8a4fff;"></div>
    <div class="meta"><div class="name">Purple</div><div class="hex">#8a4fff</div><div class="var">--color-purple</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#b98cff;"></div>
    <div class="meta"><div class="name">Purple Light</div><div class="hex">#b98cff</div><div class="var">--color-purple-light</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#6a2fe0;"></div>
    <div class="meta"><div class="name">Purple Dark</div><div class="hex">#6a2fe0</div><div class="var">--color-purple-dark</div></div>
  </div>
</div>
</body>
</html>
