<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f5f3ff; padding: 20px 24px; }
  .grid { display: flex; flex-wrap: wrap; gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 12px; flex: 1; min-width: 260px; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 11px; font-weight: 700; color: #5a5a7a; letter-spacing: 0.04em; }

  .input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid rgba(138,79,255,0.2);
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; color: #1a1a2e;
    background: #fff;
    outline: none;
    transition: border-color 200ms, box-shadow 200ms;
  }
  .input::placeholder { color: #9999b8; }
  .input:focus { border-color: #8a4fff; box-shadow: 0 0 0 3px rgba(138,79,255,0.12); }
  .input-error { border-color: #ff5c5c; }
  .input-error:focus { box-shadow: 0 0 0 3px rgba(255,92,92,0.12); }
  .input-success { border-color: #4ecb71; }

  .hint { font-size: 11px; color: #9999b8; }
  .hint-error { font-size: 11px; color: #ff5c5c; }

  .textarea {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid rgba(138,79,255,0.2);
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; color: #1a1a2e;
    background: #fff; resize: none; height: 72px;
    outline: none;
  }
  .textarea:focus { border-color: #8a4fff; box-shadow: 0 0 0 3px rgba(138,79,255,0.12); }

  .select {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid rgba(138,79,255,0.2);
    border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; color: #1a1a2e;
    background: #fff; appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%238a4fff' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    outline: none;
  }

  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle { width: 40px; height: 22px; background: #e0dde8; border-radius: 9999px; position: relative; cursor: pointer; transition: background 200ms; flex-shrink: 0; }
  .toggle.on { background: #8a4fff; }
  .toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform 200ms cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  .toggle.on::after { transform: translateX(18px); }
  .toggle-label { font-size: 13px; font-weight: 500; color: #1a1a2e; }
</style>
</head>
<body>
<div class="grid">
  <div class="col">
    <div class="field">
      <div class="field-label">Default</div>
      <input class="input" type="text" placeholder="Business name…">
    </div>
    <div class="field">
      <div class="field-label">Focused</div>
      <input class="input" type="text" value="Sunrise Bakery" style="border-color:#8a4fff; box-shadow:0 0 0 3px rgba(138,79,255,0.12);">
    </div>
    <div class="field">
      <div class="field-label">Error state</div>
      <input class="input input-error" type="text" value="@bad input!">
      <div class="hint-error">Only letters and numbers allowed</div>
    </div>
    <div class="field">
      <div class="field-label">Success state</div>
      <input class="input input-success" type="text" value="hello@sunrise.com">
      <div class="hint">Looks great ✓</div>
    </div>
  </div>
  <div class="col">
    <div class="field">
      <div class="field-label">Textarea</div>
      <textarea class="textarea" placeholder="Describe your business in a few words…"></textarea>
    </div>
    <div class="field">
      <div class="field-label">Select</div>
      <select class="select"><option>Social media post</option><option>Email newsletter</option><option>Ad copy</option></select>
    </div>
    <div class="field">
      <div class="field-label">Toggles</div>
      <div class="toggle-row"><div class="toggle on"></div><div class="toggle-label">AI suggestions on</div></div>
      <div class="toggle-row" style="margin-top:6px;"><div class="toggle"></div><div class="toggle-label">Weekly digest</div></div>
    </div>
  </div>
</div>
</body>
</html>
